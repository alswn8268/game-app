<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Tap Timing</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #090909;
      --surface:     #141414;
      --primary:     #FF2D55;
      --primary-dim: rgba(255,45,85,0.2);
      --gold:        #FFD000;
      --gold-dim:    rgba(255,208,0,0.2);
      --success:     #39FF6E;
      --success-dim: rgba(57,255,110,0.2);
      --danger:      #FF3B30;
      --danger-dim:  rgba(255,59,48,0.15);
      --text:        #FFFDF5;
      --muted:       #484848;
      --ring-max:    280px;
      --target:      110px;
    }

    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ??????  ? ?????? */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ?????? ?硫? ?? ?????? */
    .screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding-bottom: 70px;
    }
    .screen.active { display: flex; }

    /* ??????????????????????????????
        ?硫?
    ?????????????????????????????? */
    #screen-menu { gap: 36px; }

    .logo-wrap { text-align: center; }

    .logo-eyebrow {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 8px;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(44px, 12vw, 72px);
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 0.9;
      color: var(--text);
      text-shadow:
        0 0 60px rgba(255,45,85,0.5),
        0 0 120px rgba(255,45,85,0.15);
    }
    /*  ??  ? */
    .logo-line {
      width: 48px;
      height: 2px;
      background: var(--primary);
      margin: 18px auto 0;
      box-shadow: 0 0 12px var(--primary);
    }

    .menu-desc {
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.9;
      max-width: 270px;
    }
    .menu-desc .hl {
      color: var(--success);
      font-weight: 600;
    }

    .best-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .best-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .best-val {
      font-family: 'Orbitron', monospace;
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 24px var(--gold-dim);
    }

    /* ??????  ?????? */
    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      padding: 20px 60px;
      border: 2px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 28px var(--primary-dim), 0 4px 0 rgba(0,0,0,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 0 16px var(--primary-dim), 0 2px 0 rgba(0,0,0,0.5);
    }

    .btn-ghost {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 14px 40px;
      border: 1px solid var(--muted);
      background: transparent;
      color: var(--muted);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-ghost:active { transform: scale(0.96); opacity: 0.6; }

    /* ??????????????????????????????
        ?硫?
    ?????????????????????????????? */
    #screen-game {
      justify-content: flex-start;
      padding-top: 0;
    }

    .hud {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 52px 28px 24px;
    }

    .hud-card {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hud-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .hud-val {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }
    /* ??? best ? */
    .hud-gap {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      height: 12px;
      transition: color 0.2s;
    }
    .hud-gap.behind { color: var(--muted); }
    .hud-gap.ahead  { color: var(--gold); }

    /* ? */
    .hearts {
      display: flex;
      gap: 5px;
      justify-content: center;
    }
    .heart {
      font-size: 18px;
      color: var(--primary);
      transition: all 0.2s;
      text-shadow: 0 0 8px var(--primary);
    }
    .heart.dead { opacity: 0.1; text-shadow: none; color: var(--muted); }
    /* ??留?  ??? ??  */
    .heart.last-pulse {
      animation: heartbeat 0.7s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      30%       { transform: scale(1.35); }
      60%       { transform: scale(1.1); }
    }

    /*  ??? */
    .arena-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .arena {
      position: relative;
      width: var(--ring-max);
      height: var(--ring-max);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arena-glow {
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,45,85,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 12px var(--primary-dim), 0 0 24px rgba(255,45,85,0.08);
      transition: border-color 0.08s, box-shadow 0.08s;
    }
    .ring.good-zone {
      border-color: var(--gold);
      box-shadow: 0 0 16px var(--gold-dim), 0 0 32px rgba(255,208,0,0.1);
    }
    .ring.perfect-zone {
      border-color: var(--success);
      box-shadow: 0 0 20px var(--success-dim), 0 0 40px rgba(57,255,110,0.15);
    }

    .zone-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .zone-good    { border: 1px dashed rgba(255,208,0,0.2); }
    .zone-perfect { border: 1px dashed rgba(57,255,110,0.2); }

    .target {
      position: absolute;
      width: var(--target);
      height: var(--target);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      transition: transform 0.08s;
    }
    .target:active { transform: scale(0.9); }
    .target-inner {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .target-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }

    /* ?? ??? */
    .feedback-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0 18px;
      gap: 6px;
      min-height: 88px;
    }

    .feedback {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(5px) scale(0.88);
      transition: opacity 0.06s, transform 0.06s;
    }
    .feedback.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .feedback.perfect { color: var(--success);  text-shadow: 0 0 20px var(--success-dim); }
    .feedback.good    { color: var(--gold);      text-shadow: 0 0 16px var(--gold-dim); }
    .feedback.miss    { color: var(--danger);    text-shadow: 0 0 16px var(--danger-dim); }
    .feedback.early   { color: var(--muted); }
    /* ???? miss ???  */
    .feedback.close   { color: #FF8C00; text-shadow: 0 0 16px rgba(255,140,0,0.4); }

    .combo-text {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--gold);
      height: 18px;
      opacity: 0;
      transition: opacity 0.2s;
      text-shadow: 0 0 10px var(--gold-dim);
    }
    .combo-text.show { opacity: 1; }

    /* ??????????????????????????????
        ?硫?
    ?????????????????????????????? */
    #screen-result { gap: 22px; }

    .result-status { text-align: center; }

    .result-over-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 7px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .result-score {
      font-family: 'Orbitron', monospace;
      font-size: clamp(64px, 20vw, 100px);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 60px rgba(255,45,85,0.4), 0 0 120px rgba(255,45,85,0.1);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 300px;
    }
    .result-cell {
      background: var(--surface);
      border: 1px solid #222;
      border-radius: 6px;
      padding: 16px 8px;
      text-align: center;
    }
    .result-cell-val {
      font-family: 'Orbitron', monospace;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1;
    }
    .result-cell-val.p   { color: var(--success); }
    .result-cell-val.g   { color: var(--gold); }
    .result-cell-val.m   { color: var(--danger); }
    .result-cell-val.acc { color: var(--text); }
    .result-cell-val.cmb { color: var(--primary); }
    .result-cell-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* best?? X?  */
    .result-bestgap {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-align: center;
    }
    .result-bestgap .gap-val {
      color: var(--primary);
      font-size: 18px;
    }

    .new-best {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      padding: 8px 24px;
      border: 1px solid rgba(255,208,0,0.4);
      border-radius: 4px;
      background: var(--gold-dim);
    }

    .result-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    /* ??????????????????????????????

    ?????????????????????????????? */
    #ad-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .ad-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ??????????????????????????????
       ? ???
    ?????????????????????????????? */
    .levelup-flash {
      position: fixed;
      inset: 0;
      background: rgba(255,208,0,0.05);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      transition: opacity 0.12s;
    }
    .levelup-flash.show { opacity: 1; }

    /* ??????????????????????????????
       ???
    ?????????????????????????????? */
    @keyframes particle {
      0%   { transform: translate(-50%,-50%) translate(0,0) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%,-50%) translate(var(--px),var(--py)) scale(0); opacity: 0; }
    }
    .pt {
      position: absolute;
      width: 7px; height: 7px;
      border-radius: 50%;
      top: 50%; left: 50%;
      pointer-events: none;
      animation: particle 0.55s cubic-bezier(0.1,0,0.8,1) forwards;
    }

    /* ??????????????????????????????
       ???
    ?????????????????????????????? */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-10px); }
      35%      { transform: translateX(10px); }
      55%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .shaking { animation: shake 0.3s ease; }

    /* ??????????????????????????????
       ?? ?
    ?????????????????????????????? */
    @keyframes scorepop {
      0%   { transform: scale(1.5); }
      60%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    .scorepop { animation: scorepop 0.28s cubic-bezier(0.34,1.56,0.64,1); }

    /* ??????????????????????????????
       ?硫?  ??
    ?????????????????????????????? */
    #ad-interstitial {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 20px;
    }
    #ad-interstitial.show { display: flex; }

    .ad-full-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--muted);
    }
    .ad-full-box {
      width: 300px; height: 250px;
      background: var(--surface);
      border: 1px solid #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 2px;
    }
    .ad-skip-timer {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
    }
    .ad-skip-btn {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 12px 30px;
      border: 1px solid var(--muted);
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      display: none;
    }

    /* ??????????????????????????????
       ?? ?? (?紐? 1?)
    ?????????????????????????????? */
    .danger-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      border: 3px solid var(--danger);
      opacity: 0;
      display: none;
      box-shadow: inset 0 0 60px rgba(255,59,48,0.18);
      animation: dangerPulse 0.9s ease-in-out infinite;
    }
    .danger-overlay.active { display: block; }
    @keyframes dangerPulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.75; }
    }

    /* ??????????????????????????????
       ? ??? ??
    ?????????????????????????????? */
    .levelup-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--gold);
      text-shadow: 0 0 30px var(--gold-dim);
      pointer-events: none;
      z-index: 55;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
      transition: opacity 0.15s, transform 0.15s;
    }
    .levelup-text.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .levelup-text.hide {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.3);
      transition: opacity 0.3s, transform 0.3s;
    }
  </style>
</head>
<body>

  <!-- ? ??? -->
  <div class="levelup-flash" id="levelup-flash"></div>
  <!-- ? ??? -->
  <div class="levelup-text" id="levelup-text"></div>
  <!-- ?? ??? (?紐? 1?) -->
  <div class="danger-overlay" id="danger-overlay"></div>

  <!-- ?硫?  ?? (???? AdMob ?? ? ? ?) -->
  <div id="ad-interstitial">
    <div class="ad-full-label">ADVERTISEMENT</div>
    <div class="ad-full-box">[ AdMob 전면 광고 ]</div>
    <div class="ad-skip-timer" id="skip-timer">5초 후 닫기 가능...</div>
    <button class="ad-skip-btn" id="skip-btn" onclick="closeInterstitial()">광고 닫기</button>
  </div>

  <!-- ??????  ?硫? ?????? -->
  <div class="screen active" id="screen-menu">
    <div class="logo-wrap">
      <div class="logo-eyebrow">Hypercasual</div>
      <div class="logo">TAP<br/>TIMING</div>
      <div class="logo-line"></div>
    </div>

    <div class="menu-desc">
      줄어드는 링이 작은 원에 들어갈 때<br/>
      <span class="hl">초록 구간</span>에서 탭하면 PERFECT!<br/>
      콤보를 쌓아 최고 점수에 도전하세요
    </div>

    <button class="btn" onclick="startGame()">PLAY</button>

    <div class="best-wrap">
      <div class="best-label">Best Score</div>
      <div class="best-val" id="best-score">0</div>
    </div>
  </div>

  <!-- ??????  ?硫? ?????? -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <div class="hud-card">
        <div class="hud-label">Score</div>
        <div class="hud-val" id="hud-score">0</div>
        <div class="hud-gap behind" id="hud-gap"></div>
      </div>
      <div class="hud-card">
        <div class="hud-label">Lives</div>
        <div class="hearts" id="hud-lives">
          <span class="heart">❤</span>
          <span class="heart">❤</span>
          <span class="heart">❤</span>
        </div>
      </div>
      <div class="hud-card">
        <div class="hud-label">Level</div>
        <div class="hud-val" id="hud-level">1</div>
      </div>
    </div>

    <div class="arena-wrap">
      <div class="arena" id="arena">
        <div class="arena-glow"></div>
        <div class="zone-ring zone-good"   id="zone-good"></div>
        <div class="zone-ring zone-perfect" id="zone-perfect"></div>
        <div class="ring" id="ring"></div>
        <div class="target" id="target">
          <div class="target-inner">
            <div class="target-dot"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="feedback-area">
      <div class="feedback" id="feedback"></div>
      <div class="combo-text" id="combo-text"></div>
    </div>
  </div>

  <!-- ??????  ?硫? ?????? -->
  <div class="screen" id="screen-result">
    <div class="result-status">
      <div class="result-over-label">GAME OVER</div>
      <div class="result-score" id="result-score">0</div>
    </div>

    <div class="result-grid">
      <div class="result-cell">
        <div class="result-cell-val p" id="r-perfect">0</div>
        <div class="result-cell-label">Perfect</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-val g" id="r-good">0</div>
        <div class="result-cell-label">Good</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-val m" id="r-miss">0</div>
        <div class="result-cell-label">Miss</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-val cmb" id="r-maxcombo">0</div>
        <div class="result-cell-label">Max Combo</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-val acc" id="r-accuracy">0%</div>
        <div class="result-cell-label">Accuracy</div>
      </div>
      <div class="result-cell">
        <div class="result-cell-val acc" id="r-level">1</div>
        <div class="result-cell-label">Max Level</div>
      </div>
    </div>

    <div class="result-bestgap" id="result-bestgap"></div>
    <div class="new-best" id="new-best" style="display:none">★ NEW RECORD ★</div>

    <div class="result-btns">
      <button class="btn" onclick="startGame()">RETRY</button>
      <button class="btn-ghost" onclick="showScreen('screen-menu')">MENU</button>
    </div>
  </div>

  <!-- ??????   ?????? -->
  <div id="ad-banner">
    <!-- ?? AdMob : Capacitor AdMob ??? ? ?? ?? -->
    <div class="ad-label">Advertisement</div>
  </div>

  <script type="module">

    /* ??????????????????????????????????????
       ??? ?吏? (Web Audio API, ?? ?? ??)
    ?????????????????????????????????????? */
    let _ac = null;
    function getAC() {
      if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
      if (_ac.state === 'suspended') _ac.resume();
      return _ac;
    }

    /* ?? ? ?? */
    function tone(freq, type, vol, dur, delay = 0, dest = null) {
      try {
        const ctx  = getAC();
        const t    = ctx.currentTime + delay;
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(dest || ctx.destination);
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.05);
      } catch (_) {}
    }

    /* ?????? ? ?????? */
    const SFX = {
      perfect() {
        tone(880,  'sine',     0.28, 0.14, 0.00);
        tone(1100, 'sine',     0.20, 0.12, 0.07);
        tone(1320, 'sine',     0.16, 0.11, 0.14);
      },
      good() {
        tone(660, 'sine',      0.24, 0.18, 0.00);
        tone(880, 'sine',      0.09, 0.10, 0.09);
      },
      close() {
        tone(440, 'triangle',  0.18, 0.12, 0.00);
        tone(360, 'triangle',  0.12, 0.10, 0.10);
      },
      miss() {
        tone(160, 'sawtooth',  0.28, 0.28, 0.00);
        tone(80,  'square',    0.16, 0.20, 0.06);
      },
      early() {
        tone(520, 'triangle',  0.18, 0.08, 0.00);
        tone(380, 'triangle',  0.13, 0.09, 0.09);
      },
      levelUp() {
        [523, 659, 784, 1047].forEach((f, i) =>
          tone(f, 'sine', 0.24, 0.16, i * 0.075)
        );
      },
      gameOver() {
        tone(392, 'triangle',  0.26, 0.38, 0.00);
        tone(330, 'triangle',  0.26, 0.38, 0.28);
        tone(261, 'triangle',  0.26, 0.55, 0.56);
      },
      combo(n) {
        tone(440 + Math.min(n, 12) * 38, 'sine', 0.15, 0.10, 0.00);
      },
    };

    /* ??????????????????????????????????????
       ?? ?吏? (?????, )
       ??? 硫? ??? / ???? ?????
    ?????????????????????????????????????? */
    const BGM = (() => {
      let schedulerTimer = null;
      let nextBarTime    = 0;
      let barCount       = 0;
      let masterGain     = null;
      let _bpm           = 132;

      /* ????? ?? (A minor) */
      const NOTES = { A2:110, C3:130.8, D3:146.8, E3:164.8, G3:196, A3:220, C4:261.6, E4:329.6 };

      function ctx() { return getAC(); }

      function getMaster() {
        if (!masterGain) {
          masterGain = ctx().createGain();
          masterGain.gain.value = 0.22;
          masterGain.connect(ctx().destination);
        }
        return masterGain;
      }

      /* ? ??: ???? ?? + ?? */
      function kick(t) {
        const o = ctx().createOscillator();
        const g = ctx().createGain();
        o.connect(g); g.connect(getMaster());
        o.type = 'sine';
        o.frequency.setValueAtTime(160, t);
        o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
        g.gain.setValueAtTime(1.2, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
        o.start(t); o.stop(t + 0.3);
      }

      /* ???: ??利? ? */
      function hihat(t, vol = 0.18) {
        const bufSize = ctx().sampleRate * 0.04;
        const buf  = ctx().createBuffer(1, bufSize, ctx().sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx().createBufferSource();
        src.buffer = buf;
        const filt = ctx().createBiquadFilter();
        filt.type = 'highpass'; filt.frequency.value = 8000;
        const g = ctx().createGain();
        src.connect(filt); filt.connect(g); g.connect(getMaster());
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
        src.start(t); src.stop(t + 0.05);
      }

      /* ?? ??? */
      function openhat(t) { hihat(t, 0.3); }

      /* ? ?? */
      function bass(freq, t, dur) {
        const o = ctx().createOscillator();
        const g = ctx().createGain();
        const f = ctx().createBiquadFilter();
        o.connect(f); f.connect(g); g.connect(getMaster());
        o.type = 'sawtooth';
        o.frequency.value = freq;
        f.type = 'lowpass'; f.frequency.value = 400; f.Q.value = 2;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(0.55, t + 0.02);
        g.gain.setValueAtTime(0.55, t + dur - 0.06);
        g.gain.linearRampToValueAtTime(0.0001, t + dur);
        o.start(t); o.stop(t + dur + 0.05);
      }

      /*  ?? (?? ? ?) */
      function lead(freq, t, dur, vol = 0.12) {
        const o = ctx().createOscillator();
        const g = ctx().createGain();
        o.connect(g); g.connect(getMaster());
        o.type = 'square';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.015);
        g.gain.setValueAtTime(vol, t + dur - 0.04);
        g.gain.linearRampToValueAtTime(0.0001, t + dur);
        o.start(t); o.stop(t + dur + 0.05);
      }

      /* ?? (吏?? ??) */
      function pad(freqs, t, dur) {
        freqs.forEach(f => {
          const o = ctx().createOscillator();
          const g = ctx().createGain();
          o.connect(g); g.connect(getMaster());
          o.type = 'sine'; o.frequency.value = f;
          g.gain.setValueAtTime(0.0001, t);
          g.gain.linearRampToValueAtTime(0.06, t + 0.3);
          g.gain.setValueAtTime(0.06, t + dur - 0.3);
          g.gain.linearRampToValueAtTime(0.0001, t + dur);
          o.start(t); o.stop(t + dur + 0.05);
        });
      }

      /* ?????? 4? ? ??  ???????????????????????????????????????????????????
         ? (0~3)? ?? ?? ??? ??.
         2? ???  (0,1 ? 0,1 ? ...)
      ???????????????????????????????????????????????????????????????????????????????????????????????????????????? */
      function scheduleBar(t, barIdx) {
        const b = 60 / _bpm;   // 1? (?)
        const s = b / 2;       // 8?

        const pattern = barIdx % 2;

        /* ?: 1,3? */
        kick(t);
        kick(t + b * 2);
        /* ???: 8? */
        for (let i = 0; i < 8; i++) {
          if (i === 6) openhat(t + s * i); // 3? ? ???
          else         hihat(t + s * i);
        }

        /* ??? (A minor , ? ?? ??) */
        if (pattern === 0) {
          bass(NOTES.A2, t,          b * 1.9);
          bass(NOTES.E3, t + b * 2,  b * 0.9);
          bass(NOTES.G3, t + b * 3,  b * 0.9);
        } else {
          bass(NOTES.A2, t,          b * 0.9);
          bass(NOTES.C3, t + b * 1,  b * 0.9);
          bass(NOTES.D3, t + b * 2,  b * 1.9);
        }

        /*  ? (4? ??? ??) */
        if (barIdx % 4 === 0) {
          lead(NOTES.A3, t,          s * 0.9);
          lead(NOTES.C4, t + s,      s * 0.9);
          lead(NOTES.E4, t + s * 3,  b * 0.9);
        } else if (barIdx % 4 === 2) {
          lead(NOTES.G3, t,          s * 0.9);
          lead(NOTES.A3, t + s * 2,  s * 0.9);
          lead(NOTES.E3, t + s * 5,  b * 1.9);
        }

        /* ?? ( ? Am ??) */
        if (pattern === 0) {
          pad([NOTES.A2 * 2, NOTES.C3 * 2, NOTES.E3 * 2], t, b * 4);
        }
      }

      /* ??: 100ms ??  ?? */
      const LOOKAHEAD = 0.12; // ?
      function schedule() {
        while (nextBarTime < ctx().currentTime + LOOKAHEAD) {
          scheduleBar(nextBarTime, barCount);
          nextBarTime += 60 / _bpm * 4;
          barCount++;
        }
        schedulerTimer = setTimeout(schedule, 50);
      }

      return {
        start() {
          if (schedulerTimer) return;
          barCount    = 0;
          nextBarTime = ctx().currentTime + 0.05;
          getMaster().gain.setValueAtTime(0, ctx().currentTime);
          getMaster().gain.linearRampToValueAtTime(0.22, ctx().currentTime + 1.5);
          schedule();
        },
        stop() {
          if (schedulerTimer) { clearTimeout(schedulerTimer); schedulerTimer = null; }
          if (masterGain) {
            masterGain.gain.linearRampToValueAtTime(0, ctx().currentTime + 0.8);
            setTimeout(() => { masterGain = null; }, 1000);
          }
        },
        setTempo(bpm) { _bpm = bpm; },
        setBpm(level) {
          /* ? ??? ?? ??: 132 ? ?? 168 */
          _bpm = Math.min(168, 132 + (level - 1) * 3);
        },
      };
    })();

    /* ??????????????????????????????????????
        ??
    ?????????????????????????????????????? */
    const C = {
      maxLives:     3,
      tapsPerLevel: 5,
      baseSpeed:    2200,   // ms, ?? 1 ??
      speedDecay:   0.90,   // ?? ?? 10% ??
      pts: { perfect: 100, good: 50 },
      combo: [{ n: 5, x: 3 }, { n: 3, x: 2 }],
      adEvery: 3,
    };

    /* ? ?? ??
       - targetR      : ???? ??? (???? ?????)
       - perfectThresh: PERFECT ?? ?李? ??  (???? )
       - goodThresh   : GOOD ?? ?李? ?? 
       - fakeoutChance: ??  ???  ?? ?? (0~1)
       - ringStart    :  ???? ?? (?? 8+: ???) */
    function getLevelCfg(level) {
      const tier = Math.floor((level - 1) / 3);
      return {
        targetR:       Math.max(86, 110 - tier * 6),
        perfectThresh: Math.max(10, 18  - Math.floor((level - 1) / 4) * 2),
        goodThresh:    Math.max(24, 38  - Math.floor((level - 1) / 5) * 2),
        fakeoutChance: level >= 5 ? Math.min(0.55, (level - 4) * 0.08) : 0,
        ringStart:     level >= 8 ? 215 + Math.floor(Math.random() * 66) : 280,
      };
    }

    /* ??????????????????????????????????????
       ??
    ?????????????????????????????????????? */
    let S = {};
    let raf = null, t0 = null, spd = 0;
    let LC  = {};            // ??  ?? ??
    let fakeoutState = null; // { frozenSize, start, pauseEnd }
    let fakeoutAt    = -1;   // ???  progress 吏?? (-1 = ??)
    let deathCount = 0;
    let tapBlocked = false;
    let fallbackAdShowing = false;

    /* ??????????????????????????????????????
       AdMob
    ?????????????????????????????????????? */
    async function initAdMob() {
      try {
        const { AdMob } = await import('@capacitor-community/admob');
        window._admob = AdMob;
        await AdMob.initialize();
        await AdMob.showBanner({
          adId: 'ca-app-pub-7019972761461908/3904820752',
          adSize: 'BANNER', position: 'BOTTOM_CENTER', margin: 0,
        });
        await AdMob.prepareInterstitial({
          adId: 'ca-app-pub-7019972761461908/9616312432',
        });
      } catch { /* ? ??  */ }
    }

    async function showInterstitialAd() {
      if (window._admob) {
        try {
          await window._admob.showInterstitial();
          await window._admob.prepareInterstitial({
            adId: 'ca-app-pub-7019972761461908/9616312432',
          });
        } catch { showFallbackAd(); }
      } else {
        showFallbackAd();
      }
    }

    let skipInterval = null;
    function showFallbackAd() {
      fallbackAdShowing = true;
      const overlay = document.getElementById('ad-interstitial');
      const timer   = document.getElementById('skip-timer');
      const skipBtn = document.getElementById('skip-btn');
      overlay.classList.add('show');
      skipBtn.style.display = 'none';
      timer.style.display = 'block';
      let sec = 5;
      timer.textContent = sec + '초 후 닫기 가능...';
      if (skipInterval) clearInterval(skipInterval);
      skipInterval = setInterval(() => {
        sec--;
        if (sec <= 0) {
          clearInterval(skipInterval);
          timer.style.display = 'none';
          skipBtn.style.display = 'inline-block';
        } else {
          timer.textContent = sec + '초 후 닫기 가능...';
        }
      }, 1000);
    }
    window.closeInterstitial = function () {
      fallbackAdShowing = false;
      document.getElementById('ad-interstitial').classList.remove('show');
      document.getElementById('skip-timer').style.display = 'block';
      showScreen('screen-result');
    };

    /* ??????????????????????????????????????
        ??
    ?????????????????????????????????????? */
    function startGame() {
      S = {
        score: 0, lives: C.maxLives, level: 1,
        combo: 0, tapCount: 0, active: true,
        maxCombo: 0,
        stats: { perfect: 0, good: 0, miss: 0 },
      };
      tapBlocked = false;
      setDanger(false);
      refreshHUD();
      refreshLives();
      hideFeedback();
      showScreen('screen-game');
      BGM.setBpm(1);
      BGM.start();
      setTimeout(launchRing, 380);
    }

    /* ??????????????????????????????????????
       留? 
    ?????????????????????????????????????? */
    function launchRing() {
      if (!S.active) return;
      LC  = getLevelCfg(S.level);
      spd = C.baseSpeed * Math.pow(C.speedDecay, S.level - 1);
      t0  = performance.now();
      tapBlocked   = false;
      fakeoutState = null;
      // ???:  ???  ??? , prog 30~65% ?? ?? 吏??
      fakeoutAt = Math.random() < LC.fakeoutChance
        ? 0.30 + Math.random() * 0.35
        : -1;
      updateZones();
      if (raf) cancelAnimationFrame(raf);
      tick();
    }

    /* ??????????????????????????????????????
       ??? 
    ?????????????????????????????????????? */
    function tick() {
      if (!S.active) return;
      const now  = performance.now();
      const ring = document.getElementById('ring');

      /* ???   ? */
      if (fakeoutState) {
        const elapsed = now - fakeoutState.start;
        //  ?吏? ??? ???
        const wobble = Math.sin(elapsed * 0.016) * 3.5;
        const sz = fakeoutState.frozenSize + wobble;
        ring.style.width  = sz + 'px';
        ring.style.height = sz + 'px';
        if (now < fakeoutState.pauseEnd) {
          raf = requestAnimationFrame(tick); return;
        }
        //  ?? t0  ? ??
        t0 += (now - fakeoutState.start);
        fakeoutState = null;
      }

      const prog = Math.min((now - t0) / spd, 1);
      const size = LC.ringStart - (LC.ringStart - LC.targetR) * prog;
      ring.style.width  = size + 'px';
      ring.style.height = size + 'px';

      /* ???   */
      if (fakeoutAt > 0 && prog >= fakeoutAt) {
        fakeoutAt    = -1;
        fakeoutState = {
          frozenSize: size,
          start:      now,
          pauseEnd:   now + 260 + Math.random() * 230,
        };
        raf = requestAnimationFrame(tick); return;
      }

      const diff = Math.abs(size - LC.targetR);
      ring.classList.toggle('perfect-zone', diff <= LC.perfectThresh);
      ring.classList.toggle('good-zone',    diff <= LC.goodThresh && diff > LC.perfectThresh);

      if (prog < 1) { raf = requestAnimationFrame(tick); }
      else { if (!tapBlocked) processMiss('MISS'); }
    }

    /* ??????????????????????????????????????
       ? 
    ?????????????????????????????????????? */
    function onTap() {
      if (!S.active || tapBlocked) return;
      const ring = document.getElementById('ring');
      const size = parseFloat(ring.style.width) || LC.ringStart;
      const diff = Math.abs(size - LC.targetR);

      if (diff <= LC.perfectThresh)                processHit('PERFECT', C.pts.perfect);
      else if (diff <= LC.goodThresh)              processHit('GOOD',    C.pts.good);
      else if (size > LC.targetR + 60)             showEarlyMiss();
      else if (diff <= LC.goodThresh + 20)         processClose();   // ???? MISS
      else                                         processMiss('MISS');
    }
    window.onTap = onTap;
    window.startGame = startGame;

    /* ?????? ? ?????? */
    (async () => {
      document.getElementById('best-score').textContent = localStorage.getItem('best') || '0';
      LC = getLevelCfg(1);
      updateZones();

      const target = document.getElementById('target');
      let lastTouch = 0;
      target.addEventListener('touchstart', (e) => {
        e.preventDefault(); lastTouch = Date.now(); onTap();
      }, { passive: false });
      target.addEventListener('click', () => {
        if (Date.now() - lastTouch > 300) onTap();
      });
      document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); onTap(); }
      });
      /* PLAY   ?? ? AudioContext unlock + BGM ?? */
      document.getElementById('screen-menu').addEventListener('click', () => {
        getAC(); // unlock
      }, { once: true });
      await initAdMob();
    })();

    /* ??????????????????????????????????????
       ??
    ?????????????????????????????????????? */
    function processHit(type, base) {
      if (raf) cancelAnimationFrame(raf);
      tapBlocked = true;

      S.combo++;
      S.tapCount++;
      S.stats[type.toLowerCase()]++;
      if (S.combo > S.maxCombo) S.maxCombo = S.combo;

      const mult  = getMultiplier();
      S.score    += base * mult;
      const label = type + (mult > 1 ? ' ' + mult : '');

      type === 'PERFECT' ? SFX.perfect() : SFX.good();
      if (S.combo >= 3) SFX.combo(S.combo);

      showFeedbackText(label, type.toLowerCase());
      showCombo(S.combo);
      animateScore();
      if (type === 'PERFECT') spawnParticles();

      if (S.tapCount >= C.tapsPerLevel) {
        S.level++;
        S.tapCount = 0;
        BGM.setBpm(S.level);   // ? BGM ??
        SFX.levelUp();
        flashLevelUp();
        showLevelUpBanner(S.level);
      }

      refreshHUD();
      setTimeout(launchRing, 480);
    }

    /* ??????????????????????????????????????
       ??
    ?????????????????????????????????????? */
    function processMiss(label) {
      if (raf) cancelAnimationFrame(raf);
      tapBlocked = true;
      S.combo = 0;
      S.stats.miss++;
      S.lives--;
      refreshLives();
      SFX.miss();
      showFeedbackText(label, 'miss');
      showCombo(0);
      shakeScreen();
      setDanger(S.lives === 1);

      if (S.lives <= 0) {
        S.active = false;
        deathCount++;
        BGM.stop();
        SFX.gameOver();
        setTimeout(() => triggerGameOver(), 700);
      } else {
        setTimeout(launchRing, 700);
      }
    }

    /* ?????? ???? MISS (GOOD   ) ?????? */
    function processClose() {
      if (raf) cancelAnimationFrame(raf);
      tapBlocked = true;
      S.combo = 0;
      S.stats.miss++;
      S.lives--;
      refreshLives();
      SFX.close();
      showFeedbackText('CLOSE!', 'close');   // ? ???
      showCombo(0);
      shakeScreen();
      setDanger(S.lives === 1);

      if (S.lives <= 0) {
        S.active = false;
        deathCount++;
        BGM.stop();
        SFX.gameOver();
        setTimeout(() => triggerGameOver(), 700);
      } else {
        setTimeout(launchRing, 700);
      }
    }

    /* ?????? ?? ?? ? ?????? */
    function showEarlyMiss() {
      if (raf) cancelAnimationFrame(raf);
      tapBlocked = true;
      SFX.early();
      showFeedbackText('EARLY', 'early');
      setTimeout(launchRing, 560);
    }

    /* ??????????????????????????????????????
        ??
    ?????????????????????????????????????? */
    async function triggerGameOver() {
      setDanger(false);
      const prev   = parseInt(localStorage.getItem('best') || '0');
      const isNew  = S.score > prev;
      if (isNew) localStorage.setItem('best', S.score);

      const total    = S.stats.perfect + S.stats.good + S.stats.miss;
      const accuracy = total > 0
        ? Math.round((S.stats.perfect + S.stats.good) / total * 100)
        : 0;
      const gap = prev - S.score;

      document.getElementById('result-score').textContent  = S.score;
      document.getElementById('r-perfect').textContent     = S.stats.perfect;
      document.getElementById('r-good').textContent        = S.stats.good;
      document.getElementById('r-miss').textContent        = S.stats.miss;
      document.getElementById('r-maxcombo').textContent    = S.maxCombo;
      document.getElementById('r-accuracy').textContent    = accuracy + '%';
      document.getElementById('r-level').textContent       = S.level;
      document.getElementById('new-best').style.display    = isNew ? 'block' : 'none';
      document.getElementById('best-score').textContent    = Math.max(S.score, prev);

      /* best ?  */
      const gapEl = document.getElementById('result-bestgap');
      if (isNew) {
        gapEl.innerHTML = '';
      } else if (prev > 0) {
        gapEl.innerHTML = `최고 점수까지 <span class="gap-val">-${gap}</span>점`;
      } else {
        gapEl.innerHTML = '';
      }

      if (deathCount % C.adEvery === 0) {
        await showInterstitialAd();
        if (fallbackAdShowing) return;
      }
      showScreen('screen-result');
    }

    /* ??????????????????????????????????????
       ??
    ?????????????????????????????????????? */
    function getMultiplier() {
      for (const { n, x } of C.combo) if (S.combo >= n) return x;
      return 1;
    }

    function refreshHUD() {
      document.getElementById('hud-score').textContent = S.score;
      document.getElementById('hud-level').textContent = S.level;
      /* ??? best ? ?? */
      const best   = parseInt(localStorage.getItem('best') || '0');
      const gapEl  = document.getElementById('hud-gap');
      if (best > 0) {
        const diff = S.score - best;
        if (diff >= 0) {
          gapEl.textContent = '+' + diff;
          gapEl.className   = 'hud-gap ahead';
        } else {
          gapEl.textContent = diff;
          gapEl.className   = 'hud-gap behind';
        }
      } else {
        gapEl.textContent = '';
      }
    }

    function refreshLives() {
      document.querySelectorAll('#hud-lives .heart').forEach((h, i) => {
        h.classList.toggle('dead', i >= S.lives);
        /* ???? ??留? 留? ?? */
        h.classList.toggle('last-pulse', S.lives === 1 && i === 0);
      });
    }

    function setDanger(on) {
      document.getElementById('danger-overlay').classList.toggle('active', on);
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.showScreen = showScreen;

    let fbTimer = null;
    function showFeedbackText(text, cls) {
      const el = document.getElementById('feedback');
      el.textContent = text;
      el.className = 'feedback ' + cls;
      el.classList.add('show');
      if (fbTimer) clearTimeout(fbTimer);
      fbTimer = setTimeout(hideFeedback, 700);
    }

    function hideFeedback() {
      document.getElementById('feedback').classList.remove('show');
    }

    function showCombo(n) {
      const el = document.getElementById('combo-text');
      if (n >= 3) { el.textContent = n + ' COMBO!'; el.classList.add('show'); }
      else el.classList.remove('show');
    }

    function animateScore() {
      const el = document.getElementById('hud-score');
      el.classList.remove('scorepop');
      void el.offsetWidth;
      el.classList.add('scorepop');
    }

    function shakeScreen() {
      const el = document.getElementById('screen-game');
      el.classList.remove('shaking');
      void el.offsetWidth;
      el.classList.add('shaking');
    }

    function flashLevelUp() {
      const el = document.getElementById('levelup-flash');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 200);
    }

    let lvlTimer = null;
    function showLevelUpBanner(level) {
      const el = document.getElementById('levelup-text');
      el.className = 'levelup-text';
      el.textContent = 'LEVEL ' + level;
      void el.offsetWidth;
      el.classList.add('show');
      if (lvlTimer) clearTimeout(lvlTimer);
      lvlTimer = setTimeout(() => {
        el.classList.remove('show');
        el.classList.add('hide');
        setTimeout(() => el.classList.remove('hide'), 350);
      }, 900);
    }

    /* ??? */
    function spawnParticles() {
      const arena  = document.getElementById('arena');
      const colors = ['#FF2D55','#FFD000','#39FF6E','#FF6B35','#FFFDF5','#FFD000'];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'pt';
        const angle = (i / 14) * Math.PI * 2;
        const dist  = 50 + Math.random() * 55;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
        p.style.background = colors[i % colors.length];
        arena.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    /* ??  ? (?? ) */
    function updateZones() {
      const g  = document.getElementById('zone-good');
      const p  = document.getElementById('zone-perfect');
      const gs = LC.targetR + LC.goodThresh * 2;
      const ps = LC.targetR + LC.perfectThresh * 2;
      g.style.width = g.style.height = gs + 'px';
      p.style.width = p.style.height = ps + 'px';
    }

  </script>
</body>
</html>
