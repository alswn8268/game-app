<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 배경 그라디언트 -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#04040f"/>
    </radialGradient>

    <!-- 링 글로우 필터 -->
    <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-white" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 아이콘 라운드 클립 -->
    <clipPath id="round">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>

    <!-- 링 그라디언트 -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#round)">
    <!-- 배경 -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- 배경 그리드 패턴 -->
    <g opacity="0.07" stroke="#00e5ff" stroke-width="1">
      <line x1="0" y1="64"  x2="512" y2="64"/>
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="320" x2="512" y2="320"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
      <line x1="64"  y1="0" x2="64"  y2="512"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="192" y1="0" x2="192" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="320" y1="0" x2="320" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="448" y1="0" x2="448" y2="512"/>
    </g>

    <!-- 배경 글로우 원 -->
    <circle cx="256" cy="230" r="200" fill="rgba(0,229,255,0.04)"/>
    <circle cx="256" cy="230" r="140" fill="rgba(0,229,255,0.04)"/>

    <!-- 가장 바깥 링 (큰 링 — 줄어드는 중) -->
    <circle cx="256" cy="230" r="185"
      fill="none"
      stroke="url(#ring-grad)"
      stroke-width="7"
      opacity="0.9"
      filter="url(#glow-cyan)"/>

    <!-- 중간 링 (GOOD 구간 표시) -->
    <circle cx="256" cy="230" r="138"
      fill="none"
      stroke="#00ff88"
      stroke-width="5"
      stroke-dasharray="14 8"
      opacity="0.5"
      filter="url(#glow-green)"/>

    <!-- 안쪽 링 (PERFECT 구간) -->
    <circle cx="256" cy="230" r="105"
      fill="none"
      stroke="rgba(255,255,255,0.25)"
      stroke-width="3"
      stroke-dasharray="8 6"/>

    <!-- 타겟 원 (가운데) -->
    <circle cx="256" cy="230" r="76"
      fill="rgba(0,229,255,0.07)"
      stroke="rgba(255,255,255,0.35)"
      stroke-width="5"
      filter="url(#glow-white)"/>

    <!-- 타겟 안쪽 원 -->
    <circle cx="256" cy="230" r="44"
      fill="rgba(0,229,255,0.1)"
      stroke="rgba(255,255,255,0.15)"
      stroke-width="3"/>

    <!-- 중심 점 -->
    <circle cx="256" cy="230" r="14"
      fill="rgba(0,229,255,0.6)"
      filter="url(#glow-cyan)"/>
    <circle cx="256" cy="230" r="7"
      fill="#ffffff"/>

    <!-- 탭 파티클 효과 (작은 원들) -->
    <circle cx="256" cy="154" r="5" fill="#00ff88" opacity="0.9" filter="url(#glow-green)"/>
    <circle cx="318" cy="168" r="4" fill="#00e5ff" opacity="0.8" filter="url(#glow-cyan)"/>
    <circle cx="340" cy="228" r="5" fill="#ffffff" opacity="0.6"/>
    <circle cx="318" cy="290" r="4" fill="#00ff88" opacity="0.7" filter="url(#glow-green)"/>
    <circle cx="256" cy="310" r="5" fill="#00e5ff" opacity="0.8" filter="url(#glow-cyan)"/>
    <circle cx="194" cy="290" r="3" fill="#ffd60a" opacity="0.9"/>
    <circle cx="172" cy="228" r="5" fill="#00ff88" opacity="0.7" filter="url(#glow-green)"/>
    <circle cx="194" cy="168" r="4" fill="#00e5ff" opacity="0.8" filter="url(#glow-cyan)"/>

    <!-- 하단 텍스트 배경 -->
    <rect x="60" y="395" width="392" height="82" rx="10" fill="rgba(0,0,0,0.4)"/>

    <!-- 하단 텍스트: TAP -->
    <text x="256" y="434"
      font-family="'Arial Black', sans-serif"
      font-size="38"
      font-weight="900"
      fill="#00e5ff"
      text-anchor="middle"
      letter-spacing="10"
      filter="url(#glow-text)">TAP</text>

    <!-- 하단 텍스트: TIMING -->
    <text x="256" y="466"
      font-family="'Arial Black', sans-serif"
      font-size="22"
      font-weight="700"
      fill="rgba(255,255,255,0.55)"
      text-anchor="middle"
      letter-spacing="12">TIMING</text>

    <!-- 상단 PERFECT 뱃지 -->
    <rect x="172" y="30" width="168" height="34" rx="17" fill="rgba(0,255,136,0.12)" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
    <text x="256" y="52"
      font-family="'Arial Black', sans-serif"
      font-size="14"
      font-weight="800"
      fill="#00ff88"
      text-anchor="middle"
      letter-spacing="4"
      filter="url(#glow-green)">PERFECT!</text>

    <!-- 아이콘 테두리 (미묘하게) -->
    <rect width="512" height="512" rx="114" ry="114"
      fill="none"
      stroke="rgba(0,229,255,0.15)"
      stroke-width="4"/>
  </g>
</svg>
